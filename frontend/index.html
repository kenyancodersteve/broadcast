<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Pesa C2B Setup</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header>
      <i class="fas fa-mobile-alt mpesa-icon"></i>
      <div>
        <h1>M-Pesa C2B Integration</h1>
      </div>
    </header>

    <!-- Step 1: Get Access Token -->
    <section id="step1">
      <h2>Step 1: Get Access Token</h2>
      <form id="tokenForm">
        <input type="text" id="consumerKey" placeholder="Consumer Key" required>
        <input type="text" id="consumerSecret" placeholder="Consumer Secret" required>
        <button type="submit" class="button-primary">Get Access Token</button>
      </form>
      <div id="tokenResult" class="feedback hidden"></div>
      <button id="nextStep" class="button-primary hidden">Next → Register URLs</button>
    </section>

    <!-- Step 2: Register URLs -->
    <section id="step2" class="hidden">
      <h2>Step 2: Register Validation & Confirmation URLs</h2>
      <form id="registerForm">
        <input type="text" id="shortCode" placeholder="Shortcode (e.g. 600XXX)" required>
        <input type="url" id="confirmationUrl" placeholder="Confirmation URL" required>
        <input type="url" id="validationUrl" placeholder="Validation URL" required>
        <button type="submit" class="button-primary">Register URLs</button>
      </form>
      <div id="registerResult" class="feedback hidden"></div>
    </section>

    <footer>
      <p>&copy; 2026 M-Pesa API Helper</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
